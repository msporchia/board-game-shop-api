services:
  seller-shop:
    build: .
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      # Anonymous volume keeps the image's node_modules, shadowing the bind mount.
      - /app/node_modules
    environment:
      SELLER_API_URL: http://seller-api:8000
      MOCK_CATALOG_URL: http://mock-prestashop:8001
    networks:
      - default
      # The Python stack's network. /health has no upstream dependency, so this
      # service still starts fine when that stack is down.
      - seller

networks:
  default:
  seller:
    name: seller_default
    external: true
